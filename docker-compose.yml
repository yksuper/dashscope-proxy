services:

  proxy:
    build: .
    env_file: .env
    network_mode: host
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: sh -c 'redis-server --port 16379 --requirepass "$$REDIS_PASSWORD" --save 60 1 --loglevel warning'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -p 16379 -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
